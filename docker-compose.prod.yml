version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scheduling-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://scheduling:scheduling123@postgres:5432/scheduling_platform?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-in-production-min-32-chars}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scheduling-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: scheduling-postgres
    environment:
      POSTGRES_USER: scheduling
      POSTGRES_PASSWORD: scheduling123
      POSTGRES_DB: scheduling_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduling -d scheduling_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scheduling-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: scheduling-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scheduling-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  scheduling-network:
    driver: bridge
